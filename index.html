<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Hirono | моя коллекция</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ffffff; font-family: 'Inter', sans-serif; color: #1e2a1e; padding: 2rem 1.5rem; line-height: 1.5; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 2.5rem; border-bottom: 2px solid #e9ecef; padding-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
        .title-section h1 { font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, #f8c291, #f6e58d, #ffb8b8, #c7ecee, #dff9fb, #e056fd); -webkit-background-clip: text; background-clip: text; color: transparent; display: inline-flex; align-items: center; gap: 12px; }
        .title-section h1 i { background: none; -webkit-background-clip: unset; background-clip: unset; color: #e84393; }
        .sub { color: #6c757d; margin-top: 8px; font-size: 1rem; font-weight: 500; }
        .admin-panel { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .login-btn { background: #f8f9fa; border: 1px solid #ced4da; padding: 8px 18px; border-radius: 60px; font-weight: 500; font-size: 0.85rem; cursor: pointer; color: #495057; }
        .login-btn.active { background: #e84393; color: white; border-color: #e84393; }
        .stats { background: #f1f3f5; padding: 8px 16px; border-radius: 60px; font-size: 0.9rem; font-weight: 500; color: #343a40; }
        .stats i { margin-right: 6px; color: #e84393; }
        .collections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 28px; margin-bottom: 48px; }
        .collection-card { background: #ffffff; border-radius: 32px; border: 1px solid rgba(0,0,0,0.05); overflow: hidden; transition: all 0.25s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .collection-card:hover { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card-header { padding: 1.2rem 1.5rem 0.8rem; background: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .card-title { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; }
        .card-title h3 { font-size: 1.6rem; font-weight: 600; color: #2c3e2c; }
        .year { background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 60px; font-size: 0.75rem; font-weight: 500; color: #495057; }
        .progress-area { margin-top: 12px; display: flex; justify-content: space-between; font-size: 0.75rem; color: #6c757d; }
        .progress-bar-bg { background: #e9ecef; border-radius: 40px; height: 6px; width: 100%; margin-top: 6px; overflow: hidden; }
        .progress-fill { background: #e84393; width: 0%; height: 100%; transition: width 0.2s ease; }
        .admin-actions-col { display: flex; justify-content: flex-end; margin-top: 8px; gap: 8px; }
        .delete-collection, .add-figure-btn, .icon-btn, .edit-figure-name { background: none; border: none; cursor: pointer; transition: 0.1s; }
        .delete-collection { color: #adb5bd; font-size: 1rem; padding: 4px 8px; border-radius: 30px; }
        .delete-collection:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }
        .add-figure-btn { border: 1px solid #e84393; color: #e84393; border-radius: 40px; padding: 4px 12px; font-size: 0.7rem; }
        .add-figure-btn:hover { background: rgba(232,67,147,0.1); }
        .figures-list { padding: 0.8rem 1.2rem 1.2rem; max-height: 500px; overflow-y: auto; }
        .figure-item { display: flex; align-items: center; gap: 12px; padding: 0.7rem 0.5rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .figure-item:hover { background: rgba(0,0,0,0.02); border-radius: 20px; }
        .figure-img { width: 48px; height: 48px; border-radius: 16px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #e84393; border: 1px solid #dee2e6; flex-shrink: 0; }
        .figure-img img { width: 100%; height: 100%; border-radius: 14px; object-fit: cover; }
        .figure-info { flex: 1; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .figure-name { font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .figure-name i { color: #e84393; }
        .figure-actions { display: flex; gap: 8px; align-items: center; }
        .check-label, .owned-indicator { display: flex; align-items: center; gap: 6px; background: #f1f3f5; padding: 4px 10px; border-radius: 40px; font-size: 0.7rem; font-weight: 500; }
        .check-label input { width: 16px; height: 16px; cursor: pointer; accent-color: #e84393; }
        .owned-indicator i { font-size: 0.8rem; }
        .icon-btn { color: #adb5bd; font-size: 1rem; padding: 4px; border-radius: 30px; }
        .icon-btn:hover { background: #e9ecef; color: #e84393; }
        .edit-figure-name { font-size: 0.7rem; color: #adb5bd; }
        .add-section { background: #f8f9fa; border-radius: 40px; padding: 1.8rem 2rem; margin-top: 20px; border: 1px solid #dee2e6; display: none; }
        .add-section.visible { display: block; }
        .add-section h3 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; color: #2c3e2c; }
        .form-group { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
        .form-group input, .form-group textarea { background: white; border: 1px solid #ced4da; padding: 12px 18px; border-radius: 28px; font-family: 'Inter', monospace; font-size: 0.9rem; color: #212529; outline: none; flex: 1; }
        .form-group input:focus, .form-group textarea:focus { border-color: #e84393; box-shadow: 0 0 0 2px rgba(232,67,147,0.2); }
        .btn-add { background: #e84393; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 700; font-size: 0.9rem; color: white; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-add:hover { background: #c72a7a; transform: scale(0.98); }
        .login-form { display: inline-flex; gap: 8px; align-items: center; background: #f8f9fa; padding: 5px 15px; border-radius: 60px; }
        .login-form input { background: white; border: 1px solid #ced4da; padding: 6px 12px; border-radius: 40px; color: #212529; }
        .login-form button { background: #e84393; border: none; padding: 6px 15px; border-radius: 40px; cursor: pointer; color: white; }
        footer { margin-top: 3rem; text-align: center; font-size: 0.8rem; color: #adb5bd; border-top: 1px solid #e9ecef; padding-top: 1.5rem; }
        @media (max-width: 680px) { body { padding: 1rem; } .collections-grid { grid-template-columns: 1fr; } .login-form { flex-wrap: wrap; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title-section">
            <h1><i class="fas fa-rainbow"></i> Hirono</h1>
            <div class="sub"><i class="fas fa-heart"></i> моя коллекция</div>
        </div>
        <div class="admin-panel">
            <div class="stats" id="globalStats"><i class="fas fa-chart-simple"></i> загрузка...</div>
            <div id="authWidget"></div>
        </div>
    </div>
    <div id="collectionsContainer" class="collections-grid"></div>
    <div id="addSection" class="add-section">
        <h3><i class="fas fa-plus-circle"></i> Добавить новую серию</h3>
        <div class="form-group">
            <input type="text" id="newCollectionName" placeholder="Название коллекции">
            <input type="text" id="newCollectionYear" placeholder="Год выпуска">
        </div>
        <div class="form-group">
            <textarea id="newFiguresList" rows="2" placeholder="Список фигурок через запятую"></textarea>
        </div>
        <div style="display: flex; justify-content: flex-end;">
            <button class="btn-add" id="addCollectionBtn"><i class="fas fa-save"></i> Добавить коллекцию</button>
        </div>
    </div>
    <footer>Только милашка владелец может редактировать каталог, загружать фото и отмечать фигурки 💅 😈</footer>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyBpNlGCJSWvgONnCGX5otiyRReZg03X2CM",
        authDomain: "hirono-12cad.firebaseapp.com",
        databaseURL: "https://hirono-12cad-default-rtdb.firebaseio.com",
        projectId: "hirono-12cad",
        storageBucket: "hirono-12cad.firebasestorage.app",
        messagingSenderId: "615132679635",
        appId: "1:615132679635:web:4e7dc12096675578e2b326"
    };
    // ==========================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    const collectionsRef = database.ref('collections');

    let isAdmin = false;
    let collections = [];

    // ВАШИ ДАННЫЕ ДЛЯ ВХОДА (замените на свои из Authentication)
    const OWNER_EMAIL = "lumequentalea@gmail.com";      
    const OWNER_PASSWORD = "122565aA";          

    const RAINBOW_ACCENTS = ["#e84393","#ff6b6b","#ff9f43","#feca57","#10ac84","#1dd1a1","#54a0ff","#5f27cd","#9980FA","#ff9ff3"];
    const RAINBOW_PASTEL = ["#fff0f0","#fff5e6","#fff9e6","#f0f7e8","#e8f4f8","#e8eef8","#f5e6f5","#ffe6f0","#e6f0ff","#f0ffe6"];

    function getRandomPastelColor() { return RAINBOW_PASTEL[Math.floor(Math.random() * RAINBOW_PASTEL.length)]; }
    function getRandomAccentColor() { return RAINBOW_ACCENTS[Math.floor(Math.random() * RAINBOW_ACCENTS.length)]; }

    function getDefaultCollections() {
        return [
            { id: "col_reshape", name: "Hirono · Reshape", year: "2022", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["Lurking","Fading","Drifting","Sinking","Floating","Awakening","Dreaming","Wandering","Solitary","The Shell (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) },
            { id: "col_cityofmercy", name: "Hirono · City of Mercy", year: "2023", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["Guard","Victim","Sinner","Saint","Lost","Found","Forgiven","Forgotten","Mercy","Angel (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) },
            { id: "col_imitation", name: "Hirono · Imitation", year: "2024", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["The Thinker","The Scream","The Kiss","The Creation","The Son of Man","Girl with Pearl","The Night Watch","Vitruvian Man","Birth of Venus","The Masterpiece (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) },
            { id: "col_theotherone", name: "Hirono · The Other One", year: "2024", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["The Other One","The Double","The Shadow","The Mirror","The Reflection","The Echo","The Twin","The Copy","The Opposite","The Other Self (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) },
            { id: "col_clot", name: "Hirono · CLOT", year: "2025", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["Silk","Cotton","Denim","Wool","Linen","Leather","Fur","Velvet","Synthetic","CLOT (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) },
            { id: "col_mime", name: "Hirono · Mime", year: "2025", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["Mime","Jester","Clown","Harlequin","Pierrot","Columbina","Pulcinella","Scaramouche","Pantalone","Tragedy (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) },
            { id: "col_shelter", name: "Hirono · Shelter", year: "2025", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["Shelter","Haven","Refuge","Asylum","Sanctuary","Harbor","Oasis","Retreat","Hideaway","Home (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) },
            { id: "col_littleprince", name: "Hirono × The Little Prince", year: "2024", bgColor: getRandomPastelColor(), accentColor: getRandomAccentColor(), figures: ["The Little Prince","The Rose","The Fox","The Snake","The Lamplighter","The Geographer","The Aviator (Secret)"].map(n => ({ name: n, owned: false, imageUrl: "" })) }
        ];
    }

    function loadFromFirebase() {
        collectionsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data)) collections = data;
            else if (data && typeof data === 'object') collections = Object.values(data);
            else { collections = getDefaultCollections(); saveToFirebase(); }
            collections.forEach(c => { if (!c.bgColor) c.bgColor = getRandomPastelColor(); if (!c.accentColor) c.accentColor = getRandomAccentColor(); });
            renderAll();
        }, (error) => { console.error(error); alert("Ошибка загрузки. Проверьте интернет и правила Firebase."); });
    }

    function saveToFirebase() { if (!isAdmin) return; collectionsRef.set(collections).catch(err => console.error(err)); }

    function login(email, password) { auth.signInWithEmailAndPassword(email, password).then(() => { isAdmin = true; updateAuthUI(); renderAll(); }).catch(err => { alert("Ошибка входа: " + err.message); }); }
    function logout() { auth.signOut().then(() => { isAdmin = false; updateAuthUI(); renderAll(); }); }
    function updateAuthUI() {
        const widget = document.getElementById("authWidget");
        if (isAdmin) {
            widget.innerHTML = `<button class="login-btn active" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>`;
            document.getElementById("logoutBtn").addEventListener("click", logout);
            document.getElementById("addSection").classList.add("visible");
        } else {
            widget.innerHTML = `<div class="login-form"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPassword" placeholder="Пароль"><button id="doLoginBtn"><i class="fas fa-key"></i> Войти</button></div>`;
            document.getElementById("doLoginBtn").addEventListener("click", () => { const email = document.getElementById("loginEmail").value; const pwd = document.getElementById("loginPassword").value; if (email && pwd) login(email, pwd); else alert("Введите email и пароль"); });
            document.getElementById("addSection").classList.remove("visible");
        }
    }

    function updateFigureImage(colId, figIdx, b64) { if(!isAdmin) return; const c=collections.find(c=>c.id===colId); if(c&&c.figures[figIdx]) { c.figures[figIdx].imageUrl=b64; saveToFirebase(); } }
    function deleteFigure(colId, figIdx) { if(!isAdmin) return; const c=collections.find(c=>c.id===colId); if(c&&confirm(`Удалить "${c.figures[figIdx].name}"?`)) { c.figures.splice(figIdx,1); saveToFirebase(); } }
    function addNewFigureToCollection(colId) { if(!isAdmin) return; const c=collections.find(c=>c.id===colId); if(c) { let n=prompt("Название фигурки:"); if(n?.trim()) { c.figures.push({ name:n.trim(), owned:false, imageUrl:"" }); saveToFirebase(); } } }
    function editFigureName(colId, figIdx, cur) { if(!isAdmin) return; const n=prompt("Новое название:",cur); if(n?.trim()) { const c=collections.find(c=>c.id===colId); if(c&&c.figures[figIdx]) { c.figures[figIdx].name=n.trim(); saveToFirebase(); } } }
    function deleteCollectionById(colId) { if(!isAdmin) return; if(confirm("Удалить коллекцию?")) { collections=collections.filter(c=>c.id!==colId); saveToFirebase(); } }
    function addNewCollectionFromForm() {
        if(!isAdmin) { alert("Только владелец"); return; }
        const name=document.getElementById("newCollectionName").value.trim();
        const year=document.getElementById("newCollectionYear").value.trim()||new Date().getFullYear();
        const raw=document.getElementById("newFiguresList").value.trim();
        if(!name) { alert("Название обязательно"); return; }
        let figureNames=raw?raw.split(',').map(s=>s.trim()).filter(s=>s):[];
        if(figureNames.length===0) { alert("Добавьте хотя бы одну фигурку"); return; }
        const newFigures=figureNames.map(f=>({ name:f, owned:false, imageUrl:"" }));
        const newId="col_"+Date.now()+"_"+Math.floor(Math.random()*10000);
        collections.push({ id:newId, name, year, bgColor:getRandomPastelColor(), accentColor:getRandomAccentColor(), figures:newFigures });
        saveToFirebase();
        document.getElementById("newCollectionName").value="";
        document.getElementById("newCollectionYear").value="";
        document.getElementById("newFiguresList").value="";
    }
    function toggleOwned(colId, figIdx, isChecked) { if(!isAdmin) return; const c=collections.find(c=>c.id===colId); if(c&&c.figures[figIdx]) { c.figures[figIdx].owned=isChecked; saveToFirebase(); } }

    function getGlobalStats() { let total=0, owned=0; collections.forEach(c=>c.figures.forEach(f=>{ total++; if(f.owned) owned++; })); return { total, owned }; }

    function renderAll() {
        const container=document.getElementById("collectionsContainer");
        const { total, owned }=getGlobalStats();
        document.getElementById("globalStats").innerHTML=`<i class="fas fa-chart-simple"></i> собрано ${owned} / ${total} фигурок`;
        if(!collections.length) { container.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;"><i class="fas fa-box-open"></i><p>Нет коллекций. Войдите как владелец.</p></div>`; return; }
        container.innerHTML=collections.map(coll=>{
            const bg=coll.bgColor||getRandomPastelColor(), acc=coll.accentColor||getRandomAccentColor();
            const totalFigs=coll.figures.length, ownedCount=coll.figures.filter(f=>f.owned).length, percent=totalFigs===0?0:(ownedCount/totalFigs)*100;
            const figuresHtml=coll.figures.map((fig,idx)=>{
                const imgHtml=fig.imageUrl&&fig.imageUrl.startsWith('data:image')?`<img src="${fig.imageUrl}" alt="${escapeHtml(fig.name)}">`:`<i class="fas fa-image" style="font-size:1.8rem;"></i>`;
                const ownedControl=isAdmin?`<label class="check-label"><input type="checkbox" ${fig.owned?'checked':''} data-owned-check data-col="${coll.id}" data-fig="${idx}"><span>в коллекции</span></label>`:`<div class="owned-indicator">${fig.owned?'<i class="fas fa-check-circle" style="color:#e84393;"></i>':'<i class="far fa-circle"></i>'}<span>${fig.owned?'в коллекции':'не в коллекции'}</span></div>`;
                return `<div class="figure-item"><div class="figure-img">${imgHtml}</div><div class="figure-info"><div class="figure-name"><i class="fas fa-dragon"></i> <span>${escapeHtml(fig.name)}</span>${isAdmin?`<button class="edit-figure-name icon-btn" data-edit-figure="${coll.id}|${idx}"><i class="fas fa-pencil-alt"></i></button>`:''}</div><div class="figure-actions">${ownedControl}${isAdmin?`<button class="icon-btn" data-upload-img="${coll.id}|${idx}"><i class="fas fa-camera"></i></button><button class="icon-btn" data-del-figure="${coll.id}|${idx}"><i class="fas fa-trash-alt"></i></button>`:''}</div></div></div>`;
            }).join('');
            return `<div class="collection-card" style="background:${bg}; border-left:6px solid ${acc};"><div class="card-header"><div class="card-title"><h3>${escapeHtml(coll.name)}</h3><div class="year">${escapeHtml(coll.year)}</div></div><div class="progress-area"><span>${ownedCount}/${totalFigs}</span><span>${Math.round(percent)}%</span></div><div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%; background:${acc};"></div></div><div class="admin-actions-col">${isAdmin?`<button class="add-figure-btn" data-add-figure="${coll.id}" style="border-color:${acc}; color:${acc};"><i class="fas fa-plus"></i> Добавить фигурку</button>`:''}${isAdmin?`<button class="delete-collection" data-del-col="${coll.id}"><i class="fas fa-trash-alt"></i></button>`:''}</div></div><div class="figures-list">${figuresHtml}</div></div>`;
        }).join('');
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll('input[data-owned-check]').forEach(cb=>cb.addEventListener('change',e=>{ if(isAdmin) toggleOwned(e.target.dataset.col, parseInt(e.target.dataset.fig), e.target.checked); }));
        document.querySelectorAll('[data-upload-img]').forEach(btn=>btn.addEventListener('click',e=>{ if(!isAdmin) return; const [colId,figIdx]=e.currentTarget.dataset.uploadImg.split('|'); const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=ev=>{ const f=ev.target.files[0]; if(f){ const r=new FileReader(); r.onload=l=>updateFigureImage(colId, parseInt(figIdx), l.target.result); r.readAsDataURL(f); } }; inp.click(); }));
        document.querySelectorAll('[data-del-figure]').forEach(btn=>btn.addEventListener('click',e=>{ if(isAdmin){ const [colId,figIdx]=e.currentTarget.dataset.delFigure.split('|'); deleteFigure(colId, parseInt(figIdx)); } }));
        document.querySelectorAll('[data-add-figure]').forEach(btn=>btn.addEventListener('click',e=>{ if(isAdmin) addNewFigureToCollection(e.currentTarget.dataset.addFigure); }));
        document.querySelectorAll('[data-del-col]').forEach(btn=>btn.addEventListener('click',e=>{ if(isAdmin) deleteCollectionById(e.currentTarget.dataset.delCol); }));
        document.querySelectorAll('[data-edit-figure]').forEach(btn=>btn.addEventListener('click',e=>{ if(isAdmin){ const [colId,figIdx]=e.currentTarget.dataset.editFigure.split('|'); const c=collections.find(c=>c.id===colId); if(c&&c.figures[figIdx]) editFigureName(colId, parseInt(figIdx), c.figures[figIdx].name); } }));
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    auth.onAuthStateChanged(user=>{ isAdmin=!!user; updateAuthUI(); renderAll(); });
    loadFromFirebase();
    document.getElementById("addCollectionBtn").addEventListener("click", addNewCollectionFromForm);
</script>
</body>
</html>
